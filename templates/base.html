<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="成绩管理">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <title>{% block title %}学生成绩管理{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      padding-bottom: 80px;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    main { padding: 16px; max-width: 600px; margin: 0 auto; }
    .flash {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .flash.success { background: #dcfce7; color: #166534; }
    .flash.error { background: #fee2e2; color: #991b1b; }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .card .meta { color: #64748b; font-size: 0.85rem; margin-bottom: 10px; }
    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .score-item {
      background: #f8fafc;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }
    .score-item span { color: #64748b; }
    .avg { font-weight: 600; color: #2563eb; font-size: 0.95rem; }
    .actions { display: flex; gap: 8px; }
    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      font-weight: 500;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-block { display: block; width: 100%; }
    .btn-sm { padding: 8px 12px; font-size: 0.85rem; flex: 1; }
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      font-size: 28px;
      line-height: 56px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(37,99,235,.4);
      z-index: 200;
    }
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #475569;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }
    .section-title {
      font-size: 0.85rem;
      color: #64748b;
      margin: 20px 0 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>{% block header %}学生成绩管理{% endblock %}</h1>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block fab %}{% endblock %}
</body>
</html>
